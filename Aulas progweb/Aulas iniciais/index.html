<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="styles.css">
    <title id="tituloAtual">Isso aqui que é um título</title>
</head>
<body>

    <h1 id="headerAtual">Isso aqui é um header</h1>
    <p id="paragrafoAtual"><a href="https://www.google.com/">CLIQUE AQUI NO HYPERLINK!</a></p>
    <button id="btnMensagem">Clique aqui</button>
    <br>
    <br>
    <form id="login-form">
        <label for="lUsuario">Usuário:</label><br>
        <input type="text" id="usuario" required><br>
        <label for="lSenha">Senha:</label><br>
        <input type="password" id="senha" required><br><br>
        <button type="submit">Entrar</button>
    </form>
    <br>
    <br>
    <form id="register-form">
        <label for="lblRegisterNome">Nome:</label><br>
        <input type="text" id="primeiroNome" required><br>
        <label for="lblRegisterSobrenome">Sobrenome:</label><br>
        <input type="text" id="sobreNome" required><br>
        <label for="lblDataNascimento">Data de nascimento:</label><br>
        <input type="date" id="dataNascimento" required><br>
        <label for="lblEmail">Email:</label><br>
        <input type="email" id="email" required><br>
        <label for="lblSenha">Senha:</label><br>
        <input type="password" id="registerSenha" required><br>
        <label for="lblCpf">CPF:</label><br>
        <input type="number" id="cpf" required><br><br>
        <button type="submit">Cadastrar</button>
    </form>
    <br>
    <br>

    <h2>Consultar CEP</h2>

    <form id="cep-form">
        <label for="cep">Digite o CEP:</label><br>
        <input type="text" id="cep" required><br><br>

        <button type="submit">Buscar CEP</button>
    </form>

    <br>

    <div id="resultadoCep"></div>

    <script src="script.js"> </script>
    
</body>
</html>
